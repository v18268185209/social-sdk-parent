version: '3.8'

# ============================================================================
# Docker Compose 配置 — PostgreSQL 模式
#
# 使用方式:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# 包含:
#   - xianyu-manager: 闲鱼管理器主应用
#   - postgres: PostgreSQL 数据库
# ============================================================================

services:
  # ── 覆盖 xianyu-manager 配置（PostgreSQL 版） ───────────────────────────────
  xianyu-manager:
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile
      args:
        DB_MODE: postgres
    image: xianyu-manager:postgres-latest
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - TZ=Asia/Shanghai
      # PostgreSQL 数据源配置
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/xianyu_manager
      - SPRING_DATASOURCE_USERNAME=xianyu
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-xianyu123456}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - JAVA_OPTS=-Xmx512m -Xms256m
      - XIANYU_JWT_SECRET=${XIANYU_JWT_SECRET:-change-me-in-production}
      - XIANYU_CRYPTO_SECRET=${XIANYU_CRYPTO_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xianyu-net

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: xianyu-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=xianyu_manager
      - POSTGRES_USER=xianyu
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-xianyu123456}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xianyu -d xianyu_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xianyu-net

volumes:
  postgres-data:
    driver: local

networks:
  xianyu-net:
    driver: bridge
