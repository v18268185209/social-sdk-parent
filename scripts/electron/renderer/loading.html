<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>闲鱼管理器 · 启动中</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .logo { font-size: 64px; margin-bottom: 20px; animation: pulse 2s infinite; }
        .title { font-size: 28px; font-weight: 600; margin-bottom: 10px; }
        .subtitle { font-size: 14px; opacity: 0.8; margin-bottom: 30px; }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .status { margin-top: 20px; font-size: 13px; opacity: 0.7; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div class="logo">🐟</div>
    <div class="title">闲鱼管理器</div>
    <div class="subtitle">正在启动后端服务...</div>
    <div class="loader"></div>
    <div class="status" id="status">等待后端就绪...</div>

    <script>
        const statusEl = document.getElementById('status');
        let dots = 0;
        setInterval(() => {
            dots = (dots + 1) % 4;
            statusEl.textContent = '等待后端就绪' + '.'.repeat(dots);
        }, 500);

        // 后端就绪后会被 main 进程导航走
        setTimeout(() => {
            statusEl.textContent = '后端启动较慢，请稍候...';
        }, 15000);
    </script>
</body>
</html>
