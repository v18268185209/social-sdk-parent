<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
    <title>设置 · 闲鱼管理器</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --border: #e4e7ed;
            --text: #303133;
            --text2: #606266;
            --primary: #409eff;
            --danger: #f56c6c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            font-size: 14px;
        }
        h1 { font-size: 18px; margin-bottom: 20px; }
        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .section-title { font-weight: 600; margin-bottom: 12px; font-size: 13px; color: var(--text2); text-transform: uppercase; }
        .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .row:last-child { border-bottom: none; }
        .label { color: var(--text); }
        .value { color: var(--text2); font-size: 13px; }
        input[type="text"], input[type="number"] {
            width: 200px; padding: 6px 10px; border: 1px solid var(--border);
            border-radius: 4px; font-size: 13px; outline: none;
        }
        input:focus { border-color: var(--primary); }
        button {
            padding: 6px 16px; border-radius: 4px; border: none;
            cursor: pointer; font-size: 13px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-default { background: var(--border); color: var(--text); }
        .actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    </style>
</head>
<body>
    <h1>⚙️ 设置</h1>

    <div class="section">
        <div class="section-title">启动设置</div>
        <div class="row">
            <span class="label">开机自启</span>
            <input type="checkbox" id="autoStart">
        </div>
        <div class="row">
            <span class="label">启动时最小化到托盘</span>
            <input type="checkbox" id="startInTray">
        </div>
        <div class="row">
            <span class="label">关闭窗口时最小化到托盘</span>
            <input type="checkbox" id="minimizeToTray">
        </div>
    </div>

    <div class="section">
        <div class="section-title">服务器</div>
        <div class="row">
            <span class="label">监听端口</span>
            <input type="number" id="port" min="1024" max="65535">
        </div>
        <div class="row">
            <span class="label">Java 路径</span>
            <input type="text" id="javaPath" placeholder="java">
        </div>
    </div>

    <div class="section">
        <div class="section-title">数据与日志</div>
        <div class="row">
            <span class="label">数据目录</span>
            <span class="value" id="dataPath">-</span>
        </div>
        <div class="row">
            <span class="label"></span>
            <button class="btn-default" id="openDataBtn">打开数据目录</button>
        </div>
        <div class="row">
            <span class="label">后端状态</span>
            <span class="value" id="backendStatus">-</span>
        </div>
        <div class="row">
            <span class="label"></span>
            <button class="btn-primary" id="restartBtn">重启后端</button>
        </div>
    </div>

    <div class="actions">
        <button class="btn-default" id="cancelBtn">取消</button>
        <button class="btn-primary" id="saveBtn">保存</button>
    </div>

    <script>
        const api = window.electronAPI;
        let config = {};

        async function loadConfig() {
            config = await api.getConfig();
            document.getElementById('autoStart').checked = config.autoStart || false;
            document.getElementById('startInTray').checked = config.startInTray || false;
            document.getElementById('minimizeToTray').checked = config.minimizeToTray !== false;
            document.getElementById('port').value = config.lastPort || 8080;
            document.getElementById('javaPath').value = config.javaPath || 'java';
            document.getElementById('dataPath').textContent = await api.getDataPath();

            const status = await api.getBackendStatus();
            document.getElementById('backendStatus').textContent = status.running ? `运行中 (PID: ${status.pid})` : '已停止';
        }

        document.getElementById('openDataBtn').addEventListener('click', () => api.openDataFolder());
        document.getElementById('restartBtn').addEventListener('click', () => api.restartBackend());
        document.getElementById('cancelBtn').addEventListener('click', () => window.close());

        document.getElementById('saveBtn').addEventListener('click', async () => {
            await api.setConfig('autoStart', document.getElementById('autoStart').checked);
            await api.setConfig('startInTray', document.getElementById('startInTray').checked);
            await api.setConfig('minimizeToTray', document.getElementById('minimizeToTray').checked);
            await api.setConfig('lastPort', parseInt(document.getElementById('port').value));
            await api.setConfig('javaPath', document.getElementById('javaPath').value);
            alert('设置已保存，重启应用后生效');
            window.close();
        });

        loadConfig();
    </script>
</body>
</html>
