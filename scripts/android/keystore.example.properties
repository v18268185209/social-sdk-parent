# Keystore 配置模板
#
# 复制此文件为 keystore.properties 并填入你的签名信息
# 用于发布版本（Release APK / AAB）的签名
#
# 生成 keystore 命令:
#   keytool -genkey -v -keystore xianyu-manager.keystore -alias xianyu \
#     -keyalg RSA -keysize 2048 -validity 10000 \
#     -storepass 你的密钥库密码 -keypass 你的密钥密码

storeFile=/path/to/your/xianyu-manager.keystore
storePassword=CHANGE_ME
keyAlias=xianyu
keyPassword=CHANGE_ME
