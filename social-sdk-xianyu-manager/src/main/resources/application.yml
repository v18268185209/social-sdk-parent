server:
  port: 8080

spring:
  application:
    name: xianyu-manager
  datasource:
    url: jdbc:sqlite:./data/xianyu-manager.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT Configuration
jwt:
  secret: ${XIANYU_JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction}
  expiration: 86400000 # 24 hours in milliseconds

# Cookie Encryption Key (AES-256)
crypto:
  secret: ${XIANYU_CRYPTO_SECRET:defaultCryptoSecretKeyForDevelopmentOnly}

logging:
  level:
    cn.net.rjnetwork.xianyu.manager: DEBUG
    org.mybatis: DEBUG
