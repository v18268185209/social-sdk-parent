server:
  port: 8080

spring:
  profiles:
    active: sqlite
  application:
    name: xianyu-manager
  web:
    resources:
      static-locations: classpath:/static/,file:./data/uploads/
  mvc:
    # 让未匹配的导航请求抛出 NoHandlerFoundException，交给 SpaFallbackAdvice 转发到 index.html
    # （已存在的静态资源仍由 ResourceHttpRequestHandler 正常返回，不受影响）
    throw-exception-if-no-handler-found: true
    static-path-pattern: /static/**
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    # datasource 的 driver/url/username/password 由各 profile 文件提供：
    #   application-sqlite.yml  (默认)
    #   application-mysql.yml
    #   application-postgres.yml
    # 三选一：--spring.profiles.active=mysql 切换
    driver-class-name: ${DB_DRIVER:org.sqlite.JDBC}
    url: ${DB_URL:jdbc:sqlite:./data/xianyu-manager.db}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    druid:
      # ===== 连接池核心参数 =====
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      # ===== 检测与空闲回收 =====
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 900000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      keep-alive: true
      # ===== 空闲连接 =====
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # remove-abandoned 仅调试用，会在启动阶段误判 init 占用的连接并强制回收
      # （配合 unwrap 拿原生 Connection 时更会永久占住池槽），本地 SQLite 直接关掉
      remove-abandoned: false
      remove-abandoned-timeout: 1800
      log-abandoned: false
      # SQLite 本地文件数据库不走网络，无 SQL 注入攻击面，移除 wall filter
      # wall filter 的 BUG 会拦截 create table 里的 AUTOINCREMENT 语法
      filters: stat,slf4j
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          enabled: true
          db-type: sqlite
          config:
            drop-table-allow: false
            truncate-allow: false
            delete-where-none-check: true
            update-where-none-check: true
            multi-statement-allow: true
        slf4j:
          enabled: true
          statement-after-call-enabled: false
          result-set-log-enabled: false
      # ===== 监控 HTTP =====
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
        allow: "127.0.0.1"
        reset-enable: false
      web-stat-filter:
        enabled: true
        url-pattern: "/*"
        exclusions: "*.js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*"
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 对外 OpenAPI 文档（仅扫描 openapi.controller 包，避免泄露内部接口）
springdoc:
  packages-to-scan: cn.net.rjnetwork.xianyu.manager.openapi.controller
  api-docs:
    path: /openapi/v1/openapi.json
  swagger-ui:
    path: /openapi/v1/docs

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT Configuration
jwt:
  secret: ${XIANYU_JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction}
  expiration: 86400000 # 24 hours in milliseconds

# Cookie Encryption Key (AES-256)
crypto:
  secret: ${XIANYU_CRYPTO_SECRET:defaultCryptoSecretKeyForDevelopmentOnly}

# ======================== 通知模块 ========================
notify:
  rate-limit-per-minute: 60                  # 单通道默认每分钟发送上限（0=不限制）
  rate-limit-retry-delay-seconds: 30        # 触发限频后转入重试队列的短延时
  retry:
    enabled: true
    max-attempts: 5                          # 最大重试次数
    initial-delay-seconds: 60                # 首次重试延时
    max-delay-seconds: 1800                  # 退避上限（30 分钟）
  digest:
    cron: "0 0 9 * * ?"                       # 每天 09:00 生成昨日摘要

# Chrome 容器配置
# 默认保持有界面模式以提高滑块兼容性；Linux/Docker 服务器可用 CHROME_HEADLESS=true 覆盖。
chrome:
  headless: ${CHROME_HEADLESS:false}
  headless-mode: ${CHROME_HEADLESS_MODE:new}

# CDP 滑块验证配置 - 远程控制浏览器自动化处理闲鱼风控拦截
cdp:
  host: 127.0.0.1
  port: 9222
  timeout-seconds: 300

# 闲钱钱包 MTOP 接口名（运行时可覆盖，无需重新编译）
# 当前为占位候选；拿到真实接口名（DevTools Network 抓取 或 CDP 抓包）后改这里即可。
# 可用 POST /api/wallet/{accountId}/probe?api=候选名 在线验证，GET /api/wallet/api-names 查看当前生效值。
xianyu:
  wallet:
    balance-api: mtop.idle.web.wallet.balance.get
    bill-api: mtop.idle.web.wallet.bill.list
    bankcard-api: mtop.idle.web.wallet.bankcard.list
    withdraw-api: mtop.idle.web.wallet.withdraw

# OpenList 配置
openlist:
  url: http://127.0.0.1:5244
  username: admin
  password: openlist
  data-dir: ./data/openlist
  executable-name: openlist.exe
  port: 5244

logging:
  level:
    cn.net.rjnetwork.xianyu.manager: DEBUG
    org.mybatis: DEBUG
