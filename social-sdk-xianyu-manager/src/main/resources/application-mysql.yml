# MySQL8 profile — 三选一实现之一
# 启动：java -jar xianyu-manager.jar --spring.profiles.active=mysql \
#   --DB_URL=jdbc:mysql://localhost:3306/xianyu_manager?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai \
#   --DB_USERNAME=root --DB_PASSWORD=yourpass
#
# Docker 部署 MySQL8：
#   docker run -d --name xianyu-mysql \
#     -e MYSQL_ROOT_PASSWORD=yourpass \
#     -e MYSQL_DATABASE=xianyu_manager \
#     -p 3306:3306 mysql:8
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/xianyu_manager?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    # 覆盖 application.yml 的 SQLite wall filter 配置：
    # 不切 db-type 的话，wall 用 SQLite 规则拦 MySQL schema 的 AUTO_INCREMENT/行内注释，
    # 导致 xianyu_account 建不出来，后续所有 FK 引它的表全炸（Failed to open referenced table）。
    druid:
      filters: stat,slf4j
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        slf4j:
          enabled: true
          statement-after-call-enabled: false
          result-set-log-enabled: false
